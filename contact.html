<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nancy Tech</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav>
        <div class="logo">NANCY <span>TECH</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="grid-2">
            <div>
                <h2 style="font-size: 48px; margin-bottom: 20px;">Get In Touch</h2>
                <p style="color: var(--luna-100); margin-bottom: 40px;">Feel free to reach out for collaborations or inquiries. I am always open to discussing new projects and creative ideas.</p>
                
                <div style="display: flex; flex-direction: column; gap: 30px;">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="nm-card" style="padding: 15px; border-radius: 15px; color: var(--accent);"><i data-lucide="phone"></i></div>
                        <div>
                            <p style="font-size: 12px; color: var(--luna-100); text-transform: uppercase;">Phone</p>
                            <p style="font-weight: 600;">0983415120</p>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="nm-card" style="padding: 15px; border-radius: 15px; color: var(--accent);"><i data-lucide="mail"></i></div>
                        <div>
                            <p style="font-size: 12px; color: var(--luna-100); text-transform: uppercase;">Email</p>
                            <p style="font-weight: 600;">chavulanancy910@gmail.com</p>
                        </div>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <p style="font-size: 12px; color: var(--luna-100); text-transform: uppercase; margin-left: 10px;">Social Media</p>
                        <div style="display: flex; gap: 15px;">
                            <a href="https://github.com/Axonx4x" target="_blank" class="nm-card" style="padding: 15px; border-radius: 15px; color: var(--accent); display: flex; align-items: center; justify-content: center;"><i data-lucide="github"></i></a>
                            <a href="#" class="nm-card" style="padding: 15px; border-radius: 15px; color: var(--accent); display: flex; align-items: center; justify-content: center;"><i data-lucide="linkedin"></i></a>
                            <a href="#" class="nm-card" style="padding: 15px; border-radius: 15px; color: var(--accent); display: flex; align-items: center; justify-content: center;"><i data-lucide="twitter"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nm-card contact-form">
                <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control" rows="5" placeholder="Your Message" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nancy Tech. All rights reserved.</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
